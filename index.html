<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>1인개발TV</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        font-family: "Pretendard", system-ui, -apple-system, sans-serif;
        margin: 0;
        min-height: 100vh;
        overflow-x: clip;
        background: #f8fafc;
        color: #1e293b;
        line-height: 1.6;
      }

      .container {
        max-width: 960px;
        margin: 0 auto;
        padding: 0 24px;
      }

      header {
        background: #0f172a;
        color: #fff;
        box-shadow: 0 2px 12px rgba(15, 23, 42, 0.15);
      }

      .header-inner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
        padding: 20px 0;
        flex-wrap: wrap;
      }

      .site-brand {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
      }

      .brand-youtube-link {
        display: inline-flex;
        flex: 0 0 auto;
        border-radius: 50%;
        overflow: hidden;
        line-height: 0;
        box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.35);
      }

      .brand-youtube-link:hover {
        opacity: 0.9;
      }

      .brand-youtube-logo {
        width: 40px;
        height: 40px;
        object-fit: cover;
        display: block;
      }

      .logo {
        margin: 0;
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      .logo-link {
        color: inherit;
        text-decoration: none;
        cursor: pointer;
      }

      .logo-link:hover {
        opacity: 0.85;
      }

      .logo span {
        color: #38bdf8;
      }

      nav ul {
        display: flex;
        gap: 8px;
        list-style: none;
        margin: 0;
        padding: 0;
        flex-wrap: wrap;
      }

      .tab {
        display: inline-block;
        padding: 8px 16px;
        border-radius: 8px;
        color: #cbd5e1;
        text-decoration: none;
        font-size: 0.95rem;
        font-weight: 500;
        transition: background 0.2s, color 0.2s;
      }

      .tab:hover {
        background: rgba(255, 255, 255, 0.08);
        color: #fff;
      }

      .tab.active {
        background: #38bdf8;
        color: #0f172a;
      }

      .home-widgets {
        display: none;
        background: #fff;
        border-top: 1px solid #e2e8f0;
      }

      .home-widgets.is-visible {
        display: block;
      }

      .home-widgets-inner {
        display: grid;
        grid-template-columns: 1fr 1.4fr;
        gap: 20px;
        align-items: stretch;
        padding: 24px 0 32px;
      }

      .info-widget {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 20px;
        padding: 14px 18px;
        border-radius: 12px;
        background: #0f172a;
        color: #fff;
      }

      .clock-area {
        min-width: 0;
      }

      .live-clock {
        font-size: 1.6rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        color: #38bdf8;
      }

      .live-date {
        margin-top: 4px;
        font-size: 0.9rem;
        color: #cbd5e1;
      }

      .visitor-area {
        padding-left: 20px;
        border-left: 1px solid #334155;
        text-align: right;
        flex-shrink: 0;
      }

      .calendar-widget {
        padding: 12px 14px;
        border-radius: 12px;
        background: #f8fafc;
        border: 1px solid #e2e8f0;
      }

      .calendar-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
        font-size: 0.95rem;
        font-weight: 700;
        color: #0f172a;
      }

      .calendar-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 4px;
        text-align: center;
        font-size: 0.78rem;
      }

      .calendar-weekday {
        color: #94a3b8;
        font-weight: 600;
        padding-bottom: 4px;
      }

      .calendar-day {
        padding: 6px 0;
        border-radius: 6px;
        color: #475569;
      }

      .calendar-day.today {
        background: #38bdf8;
        color: #0f172a;
        font-weight: 700;
      }

      .calendar-day.empty {
        visibility: hidden;
      }

      .visitor-label {
        display: block;
        font-size: 0.8rem;
        color: #94a3b8;
        margin-bottom: 4px;
      }

      .visitor-count {
        font-size: 1.4rem;
        font-weight: 700;
        color: #38bdf8;
      }

      .visitor-today {
        display: block;
        margin-top: 4px;
        font-size: 0.75rem;
        color: #cbd5e1;
      }

      main {
        padding: 48px 0 64px;
      }

      .hero {
        background: #fff;
        border-radius: 16px;
        padding: 40px;
        box-shadow: 0 4px 24px rgba(15, 23, 42, 0.06);
        border: 1px solid #e2e8f0;
      }

      .hero h2 {
        margin: 0 0 16px;
        font-size: 1.75rem;
        color: #0f172a;
      }

      .hero p {
        margin: 0 0 12px;
        color: #475569;
        font-size: 1.05rem;
      }

      .hero p:last-child {
        margin-bottom: 0;
      }

      .badge {
        display: inline-block;
        margin-bottom: 20px;
        padding: 6px 12px;
        background: #e0f2fe;
        color: #0369a1;
        border-radius: 999px;
        font-size: 0.85rem;
        font-weight: 600;
      }

      .hero--home-link {
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

      .hero--home-link:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 28px rgba(15, 23, 42, 0.1);
      }

      .home-link-hint {
        display: block;
        margin-top: 16px;
        font-size: 0.85rem;
        color: #94a3b8;
      }

      .about-youtube {
        margin-top: 28px;
        padding-top: 24px;
        border-top: 1px solid #e2e8f0;
      }

      .about-youtube h3 {
        margin: 0 0 12px;
        font-size: 1.2rem;
        color: #0f172a;
      }

      .about-links {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 16px;
      }

      .about-links .project-link {
        background: #0f172a;
        color: #fff;
        padding: 10px 16px;
        border-radius: 8px;
        text-decoration: none;
      }

      .about-links .project-link:hover {
        background: #1e293b;
      }

      .hero--gallery {
        padding: 0;
        background: transparent;
        border: 0;
        box-shadow: none;
      }

      .gallery-section {
        margin-bottom: 3px;
      }

      .gallery-section:last-child {
        margin-bottom: 0;
      }

      .gallery-section-title {
        margin: 0;
        padding: 20px 24px 12px;
        font-size: 1rem;
        font-weight: 700;
        color: #0f172a;
        background: #fff;
      }

      .gallery-thumb-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
        gap: 3px;
        max-width: 560px;
        margin: 0 auto;
      }

      .gallery-thumb {
        position: relative;
        display: block;
        width: 100%;
        padding: 0;
        border: 0;
        aspect-ratio: 1 / 1;
        overflow: hidden;
        background: #0f172a;
        cursor: pointer;
      }

      .gallery-thumb img,
      .gallery-thumb video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        pointer-events: none;
      }

      .gallery-thumb-play {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(15, 23, 42, 0.35);
        color: #fff;
        font-size: 1.25rem;
        pointer-events: none;
      }

      .gallery-thumb:hover img,
      .gallery-thumb:hover video {
        transform: scale(1.04);
        transition: transform 0.25s ease;
      }

      .gallery-thumb--empty {
        display: block;
        cursor: default;
        pointer-events: none;
        min-height: 100px;
        background: linear-gradient(160deg, #f8fafc 0%, #edf1f6 55%, #e4eaf1 100%);
        border: 1px solid #cfd8e3;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.85),
          inset 0 -2px 6px rgba(15, 23, 42, 0.05);
      }

      .lightbox {
        position: fixed;
        inset: 0;
        z-index: 1000;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .lightbox.is-open {
        display: flex;
      }

      .lightbox-backdrop {
        position: absolute;
        inset: 0;
        background: rgba(15, 23, 42, 0.88);
      }

      .lightbox-panel {
        position: relative;
        z-index: 1;
        width: min(960px, 100%);
        max-height: 90vh;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .lightbox-close {
        align-self: flex-end;
        margin-bottom: 12px;
        width: 40px;
        height: 40px;
        border: 0;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.15);
        color: #fff;
        font-size: 1.5rem;
        cursor: pointer;
      }

      .lightbox-close:hover {
        background: rgba(255, 255, 255, 0.28);
      }

      .lightbox-content {
        width: 100%;
        max-height: calc(90vh - 80px);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .lightbox-content img,
      .lightbox-content video {
        max-width: 100%;
        max-height: calc(90vh - 80px);
        border-radius: 8px;
        background: #000;
      }

      .lightbox-caption {
        margin: 14px 0 0;
        color: #e2e8f0;
        font-size: 0.95rem;
        text-align: center;
      }

      body.lightbox-open main,
      body.lightbox-open header,
      body.lightbox-open .home-widgets,
      body.lightbox-open footer {
        pointer-events: none;
      }

      .hero--album {
        padding: 32px 32px 24px;
      }

      .hero--album h2 {
        margin-bottom: 8px;
      }

      .hero--album > p {
        margin-bottom: 20px;
      }

      .insta-feed {
        margin: 0 -32px -24px;
      }

      .insta-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 3px;
      }

      .insta-item {
        position: relative;
        display: block;
        aspect-ratio: 1 / 1;
        overflow: hidden;
        background: #e2e8f0;
        cursor: pointer;
      }

      .insta-item img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.25s ease;
      }

      .insta-item:hover img {
        transform: scale(1.05);
      }

      .insta-item::after {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0);
        transition: background 0.2s ease;
      }

      .insta-item:hover::after {
        background: rgba(0, 0, 0, 0.08);
      }

      .video-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 24px;
        margin-top: 24px;
      }

      .video-card {
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid #e2e8f0;
        background: #fff;
      }

      .video-wrapper {
        position: relative;
        padding-bottom: 56.25%;
        background: #0f172a;
      }

      .video-wrapper iframe,
      .video-wrapper video {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: 0;
      }

      .video-card h3 {
        margin: 0;
        padding: 14px 16px 6px;
        font-size: 1rem;
        color: #0f172a;
      }

      .video-card p {
        margin: 0;
        padding: 0 16px 14px;
        font-size: 0.875rem;
        color: #64748b;
      }

      .media-loading,
      .media-empty {
        margin-top: 20px;
        padding: 16px;
        border-radius: 10px;
        background: #f8fafc;
        color: #64748b;
        text-align: center;
      }

      .blog-section {
        margin-top: 28px;
      }

      .blog-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 20px;
      }

      .blog-toolbar-actions {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .blog-login-btn,
      .blog-logout-btn {
        padding: 10px 16px;
        border-radius: 8px;
        border: 1px solid #cbd5e1;
        background: #fff;
        color: #475569;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }

      .blog-login-btn:hover,
      .blog-logout-btn:hover {
        border-color: #94a3b8;
        background: #f8fafc;
      }

      .blog-login-panel {
        margin-bottom: 20px;
      }

      .blog-login-panel[hidden] {
        display: none;
      }

      .blog-login-form {
        display: grid;
        gap: 12px;
        max-width: 360px;
        padding: 20px;
        border-radius: 12px;
        background: #f8fafc;
        border: 1px solid #e2e8f0;
      }

      .blog-login-form label {
        font-size: 0.9rem;
        font-weight: 600;
        color: #334155;
      }

      .blog-login-form input {
        width: 100%;
        padding: 12px 14px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        font: inherit;
        color: #0f172a;
        background: #fff;
      }

      .blog-login-submit,
      .blog-login-cancel {
        padding: 10px 16px;
        border-radius: 8px;
        border: none;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }

      .blog-login-submit {
        background: #0f172a;
        color: #fff;
      }

      .blog-login-cancel {
        background: #e2e8f0;
        color: #475569;
      }

      .blog-count {
        margin: 0;
        font-size: 0.95rem;
        color: #64748b;
      }

      .blog-count strong {
        color: #0f172a;
      }

      .blog-write-btn {
        padding: 10px 18px;
        border: 0;
        border-radius: 8px;
        background: #38bdf8;
        color: #0f172a;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      .blog-write-btn:hover {
        background: #0ea5e9;
      }

      .blog-write-btn:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .blog-write-btn:disabled:hover {
        background: #38bdf8;
      }

      .blog-form-panel {
        margin-bottom: 24px;
      }

      .blog-form-panel[hidden] {
        display: none;
      }

      .blog-form {
        display: grid;
        gap: 12px;
        padding: 20px;
        border-radius: 12px;
        background: #f8fafc;
        border: 1px solid #e2e8f0;
      }

      .blog-form-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .blog-form label {
        font-size: 0.9rem;
        font-weight: 600;
        color: #334155;
      }

      .blog-form input,
      .blog-form textarea {
        width: 100%;
        padding: 12px 14px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        font: inherit;
        color: #0f172a;
        background: #fff;
      }

      .blog-form input:focus,
      .blog-form textarea:focus {
        outline: 2px solid #bae6fd;
        border-color: #38bdf8;
      }

      .blog-form textarea {
        min-height: 140px;
        resize: vertical;
      }

      .blog-submit,
      .blog-cancel-btn {
        padding: 10px 18px;
        border: 0;
        border-radius: 8px;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }

      .blog-submit {
        background: #0f172a;
        color: #fff;
      }

      .blog-submit:hover {
        background: #1e293b;
      }

      .blog-submit:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .blog-cancel-btn {
        background: #e2e8f0;
        color: #334155;
      }

      .blog-cancel-btn:hover {
        background: #cbd5e1;
      }

      .blog-storage-notice {
        margin: 0 0 16px;
        padding: 12px 14px;
        border-radius: 10px;
        background: #fff7ed;
        border: 1px solid #fdba74;
        color: #9a3412;
        font-size: 0.9rem;
        line-height: 1.5;
      }

      .blog-storage-detail {
        display: block;
        margin-top: 6px;
        font-size: 0.82rem;
        color: #c2410c;
      }

      .blog-status {
        margin: 0;
        font-size: 0.9rem;
        color: #64748b;
      }

      .blog-status.error {
        color: #dc2626;
      }

      .blog-status.success {
        color: #059669;
      }

      .blog-list-wrap {
        margin-top: 0;
      }

      .blog-empty {
        margin: 0;
        padding: 28px 20px;
        border-radius: 12px;
        border: 1px dashed #cbd5e1;
        background: #f8fafc;
        color: #64748b;
        text-align: center;
      }

      .blog-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .blog-post {
        padding: 18px 20px;
        border-radius: 12px;
        border: 1px solid #e2e8f0;
        background: #fff;
      }

      .blog-post-head {
        display: flex;
        align-items: flex-start;
        gap: 14px;
        margin-bottom: 12px;
      }

      .blog-post-actions {
        display: flex;
        gap: 8px;
        margin-left: auto;
        flex: 0 0 auto;
      }

      .blog-edit-btn,
      .blog-delete-btn {
        padding: 6px 12px;
        border-radius: 8px;
        border: 1px solid #cbd5e1;
        background: #fff;
        color: #475569;
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
      }

      .blog-edit-btn:hover {
        border-color: #38bdf8;
        color: #0284c7;
        background: #f0f9ff;
      }

      .blog-delete-btn {
        border-color: #fecaca;
        color: #dc2626;
      }

      .blog-delete-btn:hover {
        border-color: #f87171;
        background: #fef2f2;
      }

      .blog-edit-btn:disabled,
      .blog-delete-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .blog-post-index {
        flex: 0 0 auto;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        height: 32px;
        border-radius: 8px;
        background: #0f172a;
        color: #38bdf8;
        font-size: 0.85rem;
        font-weight: 700;
      }

      .blog-post-meta {
        min-width: 0;
      }

      .blog-post h3 {
        margin: 0 0 4px;
        font-size: 1.1rem;
        color: #0f172a;
      }

      .blog-post time {
        display: block;
        font-size: 0.85rem;
        color: #94a3b8;
      }

      .blog-post-body {
        margin: 0;
        padding-left: 46px;
        white-space: pre-wrap;
        color: #475569;
        font-size: 1rem;
        line-height: 1.65;
      }

      .hero--projects {
        width: 100vw;
        max-width: 100vw;
        margin-left: calc(50% - 50vw);
        margin-right: calc(50% - 50vw);
        padding: 0;
        background: transparent;
        border: 0;
        box-shadow: none;
      }

      .project-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin: 0;
      }

      .project-tile {
        position: relative;
        width: 100%;
        aspect-ratio: 16 / 9;
        min-height: 180px;
        overflow: hidden;
        background: #0f172a;
        cursor: pointer;
      }

      .project-tile--featured {
        aspect-ratio: 21 / 9;
        min-height: min(52vw, 420px);
      }

      .project-tile--featured .project-tile-content {
        padding: 20px 18px;
      }

      .project-tile--featured .project-tile-content h3 {
        font-size: 1.5rem;
        margin-bottom: 8px;
      }

      .project-tile--featured .project-tile-content p {
        font-size: 0.9rem;
        -webkit-line-clamp: 4;
      }

      .project-tile--featured .project-tile-content .project-status {
        font-size: 0.75rem;
        padding: 4px 9px;
      }

      @media (min-width: 641px) {
        .project-list {
          gap: 10px;
        }

        .project-tile {
          min-height: 220px;
        }

        .project-tile--featured {
          min-height: min(42vw, 560px);
        }

        .project-tile--featured .project-tile-content {
          padding: 28px 36px;
        }

        .project-tile--featured .project-tile-content h3 {
          font-size: 2rem;
          margin-bottom: 10px;
        }

        .project-tile--featured .project-tile-content p {
          font-size: 1rem;
          max-width: 720px;
        }

        .project-tile--featured .project-tile-content .project-status {
          font-size: 0.8rem;
          padding: 5px 10px;
        }
      }

      .project-tile-media {
        position: absolute;
        inset: 0;
      }

      .project-tile-media img,
      .project-tile-media video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.25s ease;
      }

      .project-tile:hover .project-tile-media img,
      .project-tile:hover .project-tile-media video {
        transform: scale(1.03);
      }

      .project-tile-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to top,
